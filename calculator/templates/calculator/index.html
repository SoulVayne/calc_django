<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Калькулятор</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; }
input[type=text] { width: 120px; padding: 6px; }
button { padding: 6px 12px; margin: 4px; }
.result { margin-top: 12px; font-weight: bold; }
.error { margin-top: 12px; color: red; }
</style>
</head>
<body>
<h1>Калькулятор</h1>


<form method="post">
{% csrf_token %}
<label>Число A: <input type="text" name="a" value="{{ a }}"></label>
<label>Число B: <input type="text" name="b" value="{{ b }}"></label>
<div style="margin-top:8px;">
<button type="submit" name="operation" value="add">+</button>
<button type="submit" name="operation" value="sub">−</button>
<button type="submit" name="operation" value="mul">×</button>
<button type="submit" name="operation" value="div">÷</button>
</div>
</form>


{% if result is not None %}
<div class="result">Результат: {{ result }}</div>
{% endif %}


{% if error %}
<div class="error">{{ error }}</div>
{% endif %}


</body>
</html>
